<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Basics</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="lab3-styles.css">
    <style>
        /* Internal CSS */
        h1{
            text-decoration: underline ;
            font-style: italic;
        }
        .box {
            border: 2px solid black;
            padding: 10px;
            margin: 50px;
        }
    </style>
</head>
<body>
    <h1 style="color: blue;">Styled Heading</h1>
    <p>This paragraph uses external CSS.</p>
    <div class="box">This is a styled box using "div". it has margin and borders as seen.</div>
</body>
</html>
